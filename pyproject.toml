[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"
addopts = "-p no:cacheprovider"

[tool.ruff]
target-version = "py313"
line-length = 88

[tool.ruff.lint]
select = [
  "E", "W", "F", "I", "UP", "B", "SIM", "C4", "RUF",
]
ignore = [
  "E501", # long lines in translations/url strings; formatter handles the rest
]

[tool.ruff.lint.isort]
known-first-party = ["custom_components.geosphere_next"]
combine-as-imports = true
